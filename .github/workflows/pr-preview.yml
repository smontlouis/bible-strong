name: PR Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  publish-update:
    name: Publish EAS Update
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check for Expo token
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "Add an EXPO_TOKEN repository secret before publishing PR previews."
            exit 1
          fi

      - name: Checkout PR
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Load development environment
        run: |
          yarn dotenv -c development -- node -e '
            const fs = require("node:fs")
            const keys = [
              "ANDROID_GOOGLE_SERVICES_FILE",
              "APP_NAME",
              "BUNDLE_IDENTIFIER",
              "EXPO_PUBLIC_SENTRY_DSN",
              "IOS_GOOGLE_SERVICES_FILE",
            ]
            const values = keys.map(key => `${key}=${process.env[key] ?? ""}`)
            fs.appendFileSync(process.env.GITHUB_ENV, `${values.join("\n")}\n`)
          '

      - name: Publish preview update
        uses: expo/expo-github-action/preview@v8
        with:
          command: eas update --auto
